
<div class="container m-2">
    <h2 class="bg-primary text-white text-center">Employee Details:</h2>
<table class="table table-bordered border-primary">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Salary</th>
            <th>Date of Joining</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let e of emps">
            <td>{{e.eid}}</td>
            <td>{{e.ename}}</td>
            <td>{{e.esalary}}</td>
            <td>{{e.edoj}}</td>
        </tr>
    </tbody>
</table>
</div>
