<div class="container mt-3">
  <h3 class="text-center bg-success text-white p-2 rounded">
    Available Jobs
  </h3>

  <ul class="list-group mt-3">
    <li 
      *ngFor="let j of jobs" 
      class="list-group-item d-flex justify-content-between align-items-center"
    >
      <div>
        <strong>{{ j.title }}</strong> - {{ j.company }} ({{ j.exp }} yrs)
      </div>

      <a 
        class="btn btn-outline-success btn-sm"
        [routerLink]="['/job', j.id]"
      >
        View
      </a>
    </li>
  </ul>
</div>
