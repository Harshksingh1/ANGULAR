<div class="container">
    <div class="row">
        <div class="col-md-12 bg-success-subtle">
            <form [formGroup]="userForm" (ngSubmit)="reg()">
                <div class="mb-3">
                    <label for="username" class="form-label">User Name</label>
                    <input type="text" class="form-control" formControlName="username">
                    <div *ngIf="userForm.controls.username.invalid && userForm.controls.username.touched"
                     class="form-text text-danger">username is required</div>
                </div>
                 <div class="mb-3">
                    <label for="useremail" class="form-label">User Email</label>
                    <input type="email" class="form-control" formControlName="useremail">
                    <div *ngIf="userForm.controls.useremail.invalid && userForm.controls.useremail.touched"
                     class="form-text text-danger">email is required</div>
                </div>
                 <div class="mb-3">
                    <label for="userpassword" class="form-label">User Password</label>
                    <input type="password" class="form-control" formControlName="userpassword">
                    <div *ngIf="userForm.controls.userpassword.invalid && userForm.controls.userpassword.touched"
                     class="form-text text-danger"> Min 6 digit password is required</div>
                </div>

                <button type="submit" class="btn btn-primary" [disabled]="userForm.invalid">Submit</button>

            </form>
        </div>
    </div>
</div>
