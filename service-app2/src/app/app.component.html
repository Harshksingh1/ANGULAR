<div class="container">
  <h3 class="text-center bg-primary text-white">Sharing Data Between Child Input Output</h3>
 <h4 class="bg-success-subtle text-success">Parent Component</h4>
 <h4 class="bg-success-subtle text-success">Bonus is: {{bonus}}</h4>
 
 <label class="form-label">Enter Salary</label>
 <input type="number" class="form-control" placeholder="Enter Salary" [(ngModel)]="salary">
 </div>

 <hr>
 <div class="container bg-danger-subtle">
 <app-child [salary]="salary"
 (bonusEvent)="receivebonus($event)"></app-child>
 </div>
